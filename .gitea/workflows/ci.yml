name: CI/CD Mobile & Mirroring
run-name: ${{ gitea.actor }} - Generando APK de ${{ secrets.IMAGE_NAME_MOBILE }}

on:
  push:
    branches: [ main ]

env:
  DOWNLOADS_PATH: ${{ secrets.DEPLOY_PATH_DOWNLOADS }}
  APK_FINAL_NAME: ${{ secrets.APK_FILE_NAME }}

jobs:
  build-and-deploy-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ajustar permisos para Docker
        run: chmod -R 777 ${{ gitea.workspace }}

      - name: Construir APK (Entorno Controlado)
        run: |
          docker pull ghcr.io/cirruslabs/flutter:stable || true
          
          docker run --rm \
            --memory="5g" \
            --cpus="2.5" \
            --volumes-from $(hostname) \
            -w "$GITHUB_WORKSPACE" \
            ghcr.io/cirruslabs/flutter:stable \
            sh -c "flutter pub get && flutter build apk --release --dart-define=API_URL=${{ secrets.API_URL_PROD }}"

      # PASO 1: Mover el archivo (Es fundamental que el archivo esté antes que el contenedor)
      # PASO 1: Mover el archivo
      - name: Desplegar binario APK
        run: |
          # 1. Aseguramos que la carpeta exista (ya vimos que funciona)
          sudo mkdir -p ${{ env.DOWNLOADS_PATH }}
          
          # 2. BUSCAMOS LA APK (No importa dónde esté escondida)
          # Buscamos el archivo y tomamos la primera coincidencia
          APK_SOURCE=$(find . -name "app-release.apk" | head -n 1)
          
          if [ -z "$APK_SOURCE" ]; then
            echo "❌ ERROR: No se encontró el archivo app-release.apk en el workspace."
            exit 1
          fi
          
          echo "✅ Archivo encontrado en: $APK_SOURCE"
          
          # 3. Copiamos al destino final
          sudo cp "$APK_SOURCE" ${{ env.DOWNLOADS_PATH }}/${{ env.APK_FINAL_NAME }}
          
          # 4. Ajustamos permisos para que Nginx pueda leerlo
          sudo chown -R 1000:1000 ${{ env.DOWNLOADS_PATH }}
          sudo chmod 644 ${{ env.DOWNLOADS_PATH }}/${{ env.APK_FINAL_NAME }}
          
          echo "🚀 Despliegue completado en ${{ env.DOWNLOADS_PATH }}"
          ls -lh ${{ env.DOWNLOADS_PATH }}

      # PASO 2: Levantar el servidor que Traefik va a escuchar
      - name: Configurar Servidor de Descargas (Traefik + Nginx)
        run: |
          sudo tee ${{ env.DOWNLOADS_PATH }}/docker-compose.yml > /dev/null <<EOF
          services:
            downloads-server:
              image: nginx:alpine
              container_name: downloads_app
              restart: always
              networks:
                - web
              volumes:
                - .:/usr/share/nginx/html:ro
              labels:
                - "traefik.enable=true"
                - "traefik.http.routers.downloads-app.rule=Host(\`${{ secrets.DOMAIN_URL_DOWNLOADS }}\`)"
                - "traefik.http.routers.downloads-app.entrypoints=websecure"
                - "traefik.http.routers.downloads-app.tls.certresolver=letsencrypt"
                - "traefik.docker.network=web"
          networks:
            web:
              external: true
          EOF

          cd ${{ env.DOWNLOADS_PATH }}
          sudo docker compose up -d

      - name: Sync Mirror a GitHub
        if: success() && secrets.ENABLE_MIRROR != 'false'
        run: |
          REMOTE_URL="https://${{ secrets.GIT_HUB_USER }}:${{ secrets.GIT_HUB_SYNC_TOKEN }}@github.com/${{ secrets.GIT_HUB_USER }}/${{ secrets.GIT_HUB_REPO_NAME_MOBILE }}.git"
          git push --force "$REMOTE_URL" main:main

      - name: Notificar Éxito a Telegram
        if: success()
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          COMMIT_SHA=$(git rev-parse --short HEAD)
          
          MESSAGE="📱 *APK GENERADA: ${{ secrets.IMAGE_NAME_MOBILE }}*%0A%0A"
          MESSAGE+="📝 *Cambios:* ${COMMIT_MSG}%0A"
          MESSAGE+="🆔 *Hash:* ${COMMIT_SHA}%0A%0A"
          MESSAGE+="📥 *Descarga:* https://${{ secrets.DOMAIN_URL_DOWNLOADS }}/${{ env.APK_FINAL_NAME }}%0A"
          MESSAGE+="📦 *Mirror:* GitHub Actualizado"
          
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d parse_mode="Markdown" \
          -d text="$MESSAGE"

      - name: Notificar Error a Telegram
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d parse_mode="Markdown" \
          -d text="⚠️ *FALLO EN BUILD MOBILE: ${{ secrets.IMAGE_NAME_MOBILE }}*%0A%0AEl proceso de compilación ha fallado."